services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "17001:17001"
      - "17002:17002"
      - "17003:17003"
      - "17004:17004"
      - "6060:6060"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6060/debug/pprof/"]
      interval: 2s
      timeout: 1s
      retries: 10
      start_period: 3s
    networks:
      - nets-test
    restart: unless-stopped

  client1:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    command: ["/app/client", "-server", "server", "-proto", "kcp", "-conn", "1000"]
    networks:
      - nets-test

  client2:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    command: ["/app/client", "-server", "server", "-proto", "kcp", "-conn", "1000"]
    networks:
      - nets-test

  client3:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    command: ["/app/client", "-server", "server", "-proto", "kcp", "-conn", "1000"]
    networks:
      - nets-test

  client4:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    command: ["/app/client", "-server", "server", "-proto", "kcp", "-conn", "1000"]
    networks:
      - nets-test

networks:
  nets-test:
    name: nets-test
    driver: bridge
