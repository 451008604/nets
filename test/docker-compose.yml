services:
  server_big:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "17001:17001"
      - "17002:17002"
      - "17003:17003"
      - "17004:17004"
      - "16060:6060"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6060/debug/pprof/"]
      interval: 2s
      timeout: 1s
      retries: 10
      start_period: 3s
    networks:
      - nets-test
    restart: unless-stopped

  client_big:
    build:
      context: .
      dockerfile: client/Dockerfile
    deploy:
      replicas: 10  # 批量启动客户端
    depends_on:
      server_big:
        condition: service_healthy
    command: ["/app/client", "-server", "server_big", "-proto", "tcp,ws,http,kcp", "-conn", "5000"]
    networks:
      - nets-test
#    restart: unless-stopped # 循环测试

# 启动一组少量客户端连接作为对照组
  server_small:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "27001:17001"
      - "27002:17002"
      - "27003:17003"
      - "27004:17004"
      - "26060:6060"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6060/debug/pprof/"]
      interval: 2s
      timeout: 1s
      retries: 10
      start_period: 3s
    networks:
      - nets-test
    restart: unless-stopped

  client_small:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      server_small:
        condition: service_healthy
    command: ["/app/client", "-server", "server_small", "-proto", "tcp,ws,http,kcp", "-conn", "4"]
    networks:
      - nets-test

networks:
  nets-test:
    name: nets-test
    driver: bridge
