services:
    server:
        build:
            context: .
            dockerfile: server/Dockerfile
        ports:
            - "17001:17001"
            - "17002:17002"
            - "17003:17003"
            - "17004:17004"
            - "16060:6060"
#        healthcheck:
#            test: [ "CMD-SHELL", "grep -q ':17AC .* 0A ' /proc/net/tcp*" ]
#            interval: 1s
#            timeout: 1s
#            retries: 5
        networks:
            - nets-test
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: "4"
                    memory: 8G
        sysctls:
            - net.core.somaxconn=65535                # 全连接队列长度
            - net.ipv4.tcp_max_syn_backlog=65535      # SYN半连接队列长度
            - net.ipv4.tcp_tw_reuse=1                 # 允许将TIME_WAIT状态的sockets重新用于新的TCP连接
            - net.ipv4.tcp_fin_timeout=15             # 保持在FIN-WAIT-2状态的时间，调低可释放内存
        ulimits:
            nofile:
                soft: 1048576
                hard: 1048576
            nproc: 65535

    client:
        build:
            context: .
            dockerfile: client/Dockerfile
        deploy:
            replicas: 10
        command: [ "/app/client", "-server", "server", "-proto", "ws", "-conn", "5000" ]
#        depends_on:
#            server:
#                condition: service_healthy
        networks:
            - nets-test
        sysctls:
            - net.ipv4.ip_local_port_range=1024 65535
            - net.ipv4.tcp_tw_reuse=1
            - net.ipv4.tcp_fin_timeout=15
        ulimits:
            nofile:
                soft: 1048576
                hard: 1048576
            nproc: 65535

networks:
    nets-test:
        name: nets-test
        driver: bridge
